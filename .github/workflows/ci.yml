name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Skip Husky during install; hooks are not used in CI and can confuse debugging.
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
